name: Android CI Build

# 1. When should this pipeline run?
on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

# 2. What jobs should it do?
jobs:
  build:
    # 3. What operating system should the server use?
    runs-on: ubuntu-latest

    # 4. The step-by-step instructions
    steps:
      # Step A: Download your code onto the server
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step B: Install the correct version of Java
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # Step C: Give the server permission to execute your Gradle wrapper
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Step D: Build the Debug APK
      - name: Build Debug APK
        run: ./gradlew assembleDebug

      # Step E: Save the finished APK so you can download it
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk